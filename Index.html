<title>SUỐI 626 — Khu sinh thái · Nhà hàng mộc · Team building</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#F6F0E2;
    --cream-2:#EFE5D2;
    --forest:#234A33;
    --forest-deep:#15301F;
    --amber:#C2832C;
    --amber-soft:#E0A94B;
    --terra:#A8502A;
    --ink:#2C261F;
    --muted:#6E665A;
    --dark:#160F08;
    --line:rgba(35,74,51,.16);
    --disp:'Barlow Condensed',system-ui,sans-serif;
    --body:'Be Vietnam Pro',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--body);background:var(--cream);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  .wrap{max-width:1240px;margin:0 auto;padding:0 28px}

  .eyebrow{font-family:var(--disp);text-transform:uppercase;letter-spacing:.32em;font-size:13px;font-weight:600;color:var(--amber);display:inline-flex;align-items:center;gap:14px}
  .eyebrow::before{content:"";width:34px;height:1px;background:var(--amber)}
  h2.title{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--forest);font-size:clamp(30px,4.6vw,52px);line-height:1.02;margin-top:10px}

  /* HEADER */
  header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(246,240,226,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);transition:transform .4s ease}
  .nav{display:flex;align-items:center;justify-content:space-between;height:72px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mark{width:34px;height:34px}
  .brand b{font-family:var(--disp);font-weight:700;letter-spacing:.16em;font-size:19px;color:var(--forest);line-height:1}
  .brand b i{color:var(--amber);font-style:normal}
  .brand small{display:block;font-family:var(--disp);font-size:9px;letter-spacing:.34em;color:var(--muted);margin-top:2px}
  .menu{display:flex;align-items:center;gap:28px;list-style:none}
  .menu>li{position:relative}
  .menu>li>a{font-family:var(--disp);text-transform:uppercase;font-weight:600;letter-spacing:.12em;font-size:13.5px;color:var(--forest-deep);padding:26px 0;display:inline-flex;align-items:center;gap:5px;transition:color .25s}
  .menu>li>a .car{font-size:9px;opacity:.6;transition:transform .3s}
  .menu>li:hover>a{color:var(--amber)}
  .menu>li:hover>a .car{transform:rotate(180deg)}
  .menu>li>a::after{content:"";position:absolute;left:0;bottom:18px;height:2px;width:0;background:var(--amber);transition:width .3s}
  .menu>li:hover>a::after{width:100%}
  .submenu{position:absolute;top:100%;left:-18px;min-width:215px;background:#fff;border:1px solid var(--line);box-shadow:0 24px 48px -20px rgba(21,48,31,.34);padding:8px;list-style:none;opacity:0;visibility:hidden;transform:translateY(8px);transition:.28s ease}
  .menu>li:hover .submenu{opacity:1;visibility:visible;transform:translateY(0)}
  .submenu a{display:block;padding:11px 16px;font-size:14px;color:var(--ink);border-left:2px solid transparent;transition:.22s}
  .submenu a:hover{background:var(--cream);border-left-color:var(--amber);color:var(--forest);padding-left:22px}
  .cta-btn{background:var(--forest);color:#fff;font-family:var(--disp);text-transform:uppercase;letter-spacing:.12em;font-weight:600;font-size:13px;padding:11px 20px;transition:.3s;border:0;cursor:pointer}
  .cta-btn:hover{background:var(--amber)}
  .lang{display:flex;gap:4px}
  .lang button{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:.08em;border:1px solid var(--line);background:transparent;color:var(--muted);width:34px;height:30px;cursor:pointer;transition:.22s}
  .lang button.on{background:var(--forest);color:#fff;border-color:var(--forest)}
  .right{display:flex;align-items:center;gap:16px}
  .burger{display:none;flex-direction:column;gap:5px;background:none;border:0;cursor:pointer;padding:6px}
  .burger span{width:26px;height:2px;background:var(--forest);transition:.3s}
