<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beauty &amp; Style</title>
<meta name="description" content="Beauty & Style — Tỏa sáng vẻ đẹp của bạn. Kết nối với chúng tôi trên TikTok & Facebook." />
<link rel="icon" href="logo.png" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold: #d9b46a;
    --gold-light: #f3dca0;
    --gold-deep: #b8893f;
    --rose: #e7b6c0;
    --rose-deep: #c98a9b;
    --ink: #0a0708;
    --ink-2: #140d10;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Montserrat', sans-serif;
    background:
      radial-gradient(1200px 800px at 50% -10%, #241419 0%, transparent 60%),
      radial-gradient(900px 700px at 85% 110%, #1c1116 0%, transparent 55%),
      linear-gradient(160deg, #0a0708 0%, #140d10 50%, #0a0708 100%);
    color: #f5ece0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 40px 20px;
    perspective: 1400px;
  }

  /* floating ambient particles */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--gold-light), transparent 70%);
    opacity: 0;
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0%   { transform: translateY(0) scale(0.6); opacity: 0; }
    10%  { opacity: .9; }
    90%  { opacity: .5; }
    100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
  }

  /* 3D stage */
  .stage {
    position: relative;
    z-index: 2;
    transform-style: preserve-3d;
    transition: transform .25s ease-out;
    width: min(92vw, 460px);
  }

  .card {
    position: relative;
    transform-style: preserve-3d;
    border-radius: 28px;
    padding: 48px 36px 40px;
    text-align: center;
    background:
      linear-gradient(145deg, rgba(40,26,32,.85), rgba(14,9,11,.92));
    border: 1px solid rgba(217,180,106,.35);
    box-shadow:
      0 40px 80px -30px rgba(0,0,0,.9),
      0 0 0 1px rgba(255,255,255,.03) inset,
      0 1px 0 rgba(243,220,160,.18) inset;
    backdrop-filter: blur(14px);
  }

  /* gold edge glow */
  .card::before {
    content: "";
    position: absolute; inset: -1px;
    border-radius: 28px;
    padding: 1px;
    background: linear-gradient(135deg, var(--gold-light), transparent 30%, transparent 70%, var(--rose));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    opacity: .6;
    pointer-events: none;
  }

  /* avatar with 3D halo */
  .avatar-wrap {
    position: relative;
    width: 200px; height: 200px;
    margin: 0 auto 26px;
    transform: translateZ(60px);
    transform-style: preserve-3d;
  }
  .halo {
    position: absolute; inset: -22px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--gold-light), var(--rose), var(--gold-deep), var(--gold-light));
    filter: blur(14px);
    opacity: .55;
    animation: spin 9s linear infinite;
  }
  .ring {
    position: absolute; inset: -8px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: linear-gradient(135deg, var(--gold-light), var(--rose-deep)) border-box;
    -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    animation: spin 14s linear infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .avatar {
    position: relative;
    width: 200px; height: 200px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    box-shadow:
      0 18px 40px -12px rgba(0,0,0,.85),
      0 0 30px rgba(217,180,106,.35);
    animation: bob 6s ease-in-out infinite;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-10px); }
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem;
    line-height: 1.05;
    font-weight: 600;
    letter-spacing: .5px;
    transform: translateZ(40px);
    background: linear-gradient(180deg, #fff7e8 0%, var(--gold) 55%, var(--gold-deep) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 2px 18px rgba(217,180,106,.25);
  }
  .brand .amp { color: var(--rose); -webkit-text-fill-color: var(--rose); font-style: italic; }

  .tagline {
    margin-top: 10px;
    font-size: .8rem;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--rose);
    transform: translateZ(30px);
  }

  .divider {
    width: 70px; height: 1px;
    margin: 22px auto 26px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    transform: translateZ(20px);
  }

  /* social buttons */
  .socials {
    display: flex;
    flex-direction: column;
    gap: 14px;
    transform: translateZ(50px);
  }
  .social {
    --c1: #fff; --c2: #fff;
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 15px 22px;
    border-radius: 16px;
    text-decoration: none;
    color: #fff;
    font-weight: 500;
    font-size: .95rem;
    letter-spacing: .4px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(217,180,106,.25);
    overflow: hidden;
    transition: transform .3s cubic-bezier(.2,.8,.2,1), box-shadow .3s, border-color .3s;
    transform-style: preserve-3d;
  }
  .social::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(120deg, var(--c1), var(--c2));
    opacity: 0;
    transition: opacity .35s;
    z-index: 0;
  }
  .social > * { position: relative; z-index: 1; }
  .social:hover {
    transform: translateY(-4px) rotateX(6deg) scale(1.02);
    border-color: transparent;
    box-shadow: 0 18px 34px -14px rgba(0,0,0,.8), 0 0 24px -6px var(--c1);
  }
  .social:hover::after { opacity: .92; }

  .social .icon {
    flex: 0 0 38px;
    width: 38px; height: 38px;
    display: grid; place-items: center;
    border-radius: 11px;
    background: rgba(0,0,0,.28);
  }
  .social .icon svg { width: 20px; height: 20px; fill: #fff; }
  .social .label { flex: 1; text-align: left; }
  .social .handle { display: block; font-size: .72rem; font-weight: 300; opacity: .8; }
  .social .arrow { font-size: 1.1rem; opacity: .7; transition: transform .3s; }
  .social:hover .arrow { transform: translateX(4px); }

  .social.tiktok { --c1: #25F4EE; --c2: #FE2C55; }
  .social.facebook { --c1: #2d88ff; --c2: #0a4fc4; }

  .footer {
    margin-top: 30px;
    font-size: .68rem;
    letter-spacing: 2px;
    color: rgba(231,182,192,.55);
    transform: translateZ(15px);
    text-transform: uppercase;
  }

  @media (max-width: 420px) {
    .brand { font-size: 2.1rem; }
    .avatar-wrap, .avatar { width: 160px; height: 160px; }
    .card { padding: 38px 24px 32px; }
  }
</style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="stage" id="stage">
    <div class="card">
      <div class="avatar-wrap">
        <div class="halo"></div>
        <div class="ring"></div>
        <img class="avatar" src="logo.png" alt="Beauty & Style logo" />
      </div>

      <h1 class="brand">Beauty <span class="amp">&amp;</span> Style</h1>
      <p class="tagline">Tỏa sáng vẻ đẹp của bạn</p>

      <div class="divider"></div>

      <nav class="socials">
        <a class="social tiktok" href="https://www.tiktok.com/@beauty.style15?_r=1&_t=ZS-97VP8asoBrl" target="_blank" rel="noopener noreferrer">
          <span class="icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16.5 3c.3 2.1 1.5 3.8 3.6 4.2v2.7c-1.3.1-2.5-.2-3.6-.8v5.9c0 3.5-2.6 5.9-5.7 5.9-3 0-5.4-2.3-5.4-5.3 0-3.2 2.7-5.5 6-5.1v2.8c-.4-.1-.9-.2-1.3-.2-1.4 0-2.5 1.1-2.5 2.5s1.1 2.5 2.6 2.5c1.5 0 2.6-1.1 2.6-2.8V3h3.7z"/></svg>
          </span>
          <span class="label">TikTok<span class="handle">@beauty.style15</span></span>
          <span class="arrow">→</span>
        </a>

        <a class="social facebook" href="https://www.facebook.com/share/18p4jHNtHT/" target="_blank" rel="noopener noreferrer">
          <span class="icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12z"/></svg>
          </span>
          <span class="label">Facebook<span class="handle">Beauty &amp; Style</span></span>
          <span class="arrow">→</span>
        </a>
      </nav>

      <p class="footer">✦ Beauty &amp; Style ✦</p>
    </div>
  </div>

<script>
  // Parallax 3D tilt following the pointer
  const stage = document.getElementById('stage');
  const damp = 14;
  function tilt(x, y, w, h) {
    const rx = ((y / h) - 0.5) * -damp;
    const ry = ((x / w) - 0.5) * damp;
    stage.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
  }
  window.addEventListener('mousemove', (e) => tilt(e.clientX, e.clientY, innerWidth, innerHeight));
  window.addEventListener('mouseleave', () => stage.style.transform = 'rotateX(0) rotateY(0)');
  window.addEventListener('deviceorientation', (e) => {
    if (e.gamma == null) return;
    const rx = Math.max(-12, Math.min(12, e.beta ? (e.beta - 45) / 4 : 0));
    const ry = Math.max(-12, Math.min(12, e.gamma / 4));
    stage.style.transform = `rotateX(${-rx}deg) rotateY(${ry}deg)`;
  });

  // Ambient floating particles
  const pc = document.getElementById('particles');
  const COUNT = 26;
  for (let i = 0; i < COUNT; i++) {
    const p = document.createElement('span');
    p.className = 'particle';
    const size = 2 + Math.random() * 5;
    p.style.width = p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.bottom = '-10px';
    p.style.animationDuration = (9 + Math.random() * 12) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    p.style.opacity = 0.3 + Math.random() * 0.5;
    pc.appendChild(p);
  }
</script>
</body>
</html>
